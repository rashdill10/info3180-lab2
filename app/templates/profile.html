{% extends "base.html" %}

{% block main %}

<div class="profile-card">
  <div class="card-header">
    <img src="{{ url_for('static', filename='profilepic.jpg') }}" class="profile-img">
    <h2>{{ fullname }}</h2>
    <p>{{ username }}</p>
    <p>{{ location }}</p>
    <p>Joined {{ date_joined }}</p>
  </div>

  <div class="card-body">
    <p class="bio">{{ bio }}</p>

    <div class="stats">
      <div class="stat-item">
        <strong>{{ posts }}</strong>
        <p>Posts</p>
      </div>
      <div class="stat-item">
        <strong>{{ following }}</strong>
        <p>Following</p>
      </div>
      <div class="stat-item">
        <strong>{{ followers }}</strong>
        <p>Followers</p>
      </div>
    </div>

    <button class="follow-btn">Follow</button>
  </div>
</div>

{% endblock %}
